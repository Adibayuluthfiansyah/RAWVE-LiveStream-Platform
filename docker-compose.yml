version: '3.8'

services:
  # postgre
  postgres:
    image: postgres:15-alpine
    container_name: golivechat_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rahasia
      POSTGRES_DB: golivechat
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # server streaming
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: rawve_media_server
    restart: always
    ports:
      - "1935:1935" 
      - "8888:8888" 
      - "8889:8889"
      - "9997:9997"

volumes:
  pgdata: